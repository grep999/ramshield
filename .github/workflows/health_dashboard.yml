name: Project Health Dashboard Agent

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature/ramshield-advanced'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tqdm # Needed for helper_agent.py, but not directly by this script. Ensure base env is good.

      - name: Run Dashboard Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/health_dashboard.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet --cached || git commit -m "agent: update health dashboard [skip ci]"
          git push origin HEAD:${{ github.ref }}