name: Helper Agent

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Allow manual triggering

jobs:
  helper-agent:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature/ramshield-advanced'  # Only run on our feature branch
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git operations

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tqdm

      - name: Run Helper Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/helper_agent.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          # Check if there are actual changes before committing
          git diff --quiet --cached || git commit -m "helper agent: automated updates [skip ci]"
          git push origin HEAD:${{ github.ref }}