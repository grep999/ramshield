# config.stress.toml — production-tuned for high-throughput stress test

[engine]
shard_count = 1024
worker_threads = 0       # auto-detect (4 cores)
ram_limit_mb = 8192      # 8GB cap

[storage]
wal_enabled = false      # disable for pure throughput benchmark
wal_path = "/tmp/ramshield_wal"

[detection]
rps_threshold = 500
batch_max_events = 8192
block_duration_ms = 60000
ewma_alpha = 0.3
threat_threshold = 0.7

[forecasting]
enabled = true
interval_secs = 5
hw_alpha = 0.3
hw_beta = 0.1
entropy_threshold = 0.7

[ipc]
enabled = true
tcp_addr = "127.0.0.1:7890"
max_connections = 1024

[dashboard]
enabled = true
http_addr = "127.0.0.1:9999"

[alerting]
enabled = true
rps_alert_threshold = 5000
entropy_alert_threshold = 0.8
alert_cooldown_secs = 60
audit_log_enabled = true
audit_log_path = "./audit.log"
